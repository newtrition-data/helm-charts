{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "embedded-rabbitmq.fullname" . }}
  labels:
    {{- include "embedded-rabbitmq.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: amqp
      port: {{ .Values.service.port }}
      targetPort: amqp
      protocol: TCP
    - name: management
      port: {{ .Values.service.managementPort }}
      targetPort: management
      protocol: TCP
  selector:
    {{- include "embedded-rabbitmq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
{{- end }}
